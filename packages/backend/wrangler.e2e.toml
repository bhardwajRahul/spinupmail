name = "spinupmail-e2e"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[placement]
mode = "smart"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["InboundAbuseCounterDurableObject"]

[[durable_objects.bindings]]
name = "ABUSE_COUNTERS"
class_name = "InboundAbuseCounterDurableObject"

[[d1_databases]]
binding = "SUM_DB"
database_name = "SUM_DB"
database_id = "a5ed1fb3-600a-45bb-991f-ad8be7170c49"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "SUM_KV"
id = "442502dbafb4409999092c94e7784fad"

[[r2_buckets]]
bucket_name = "spinupmail-attachments"
binding = "R2_BUCKET"

[[send_email]]
name = "EMAIL"

[vars]
EMAIL_DOMAINS = "spinupmail.com,spinupmail.dev"
MAX_ADDRESSES_PER_ORGANIZATION = "100"
RESEND_FROM_EMAIL = "Spinupmail <verify@spinupmail.com>"
EMAIL_MAX_BYTES = "10485760"
EMAIL_BODY_MAX_BYTES = "524288"
EMAIL_ATTACHMENT_MAX_BYTES = "10485760"
ENABLE_E2E_TEST_UTILS = "1"
