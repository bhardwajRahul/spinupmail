# For more details on how to configure Wrangler, refer to:
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "spinupmail"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[placement]
mode = "smart"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["InboundAbuseCounterDurableObject"]

[[durable_objects.bindings]]
name = "ABUSE_COUNTERS"
class_name = "InboundAbuseCounterDurableObject"

[[d1_databases]]
binding = "SUM_DB"
database_name = "SUM_DB"
database_id = "34c5ddb6-1c54-4aff-b307-5a104509a4ce"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "SUM_KV"
id = "2b0a16741ce345a4a177b48bbf2bfc30"

[[r2_buckets]]
bucket_name = "spinupmail-attachments"
binding = "R2_BUCKET"

[[send_email]]
name = "EMAIL"

[vars]
EMAIL_DOMAINS = "spinupmail.dev"
MAX_ADDRESSES_PER_ORGANIZATION = "100"
RESEND_FROM_EMAIL = "Spinupmail <verify@spinupmail.com>"
EMAIL_MAX_BYTES = "10485760"
EMAIL_BODY_MAX_BYTES = "524288"
EMAIL_ATTACHMENT_MAX_BYTES = "10485760"
EMAIL_ATTACHMENT_MAX_TOTAL_BYTES_PER_ORGANIZATION = "104857600"

# To protect the database id, kv id, we ignore this
# file when committing to the repo by running once:
# git update-index --assume-unchanged wrangler.toml
#
# Put back in git if you need to commit this file:
# git update-index --no-assume-unchanged wrangler.toml
