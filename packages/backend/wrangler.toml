# For more details on how to configure Wrangler, refer to:
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "spinupmail"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[placement]
mode = "smart"

[triggers]
crons = ["17 * * * *"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["InboundAbuseCounterDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["FixedWindowRateLimiterDurableObject"]

[[durable_objects.bindings]]
name = "ABUSE_COUNTERS"
class_name = "InboundAbuseCounterDurableObject"

[[durable_objects.bindings]]
name = "FIXED_WINDOW_RATE_LIMITERS"
class_name = "FixedWindowRateLimiterDurableObject"

[[d1_databases]]
binding = "SUM_DB"
database_name = "SUM_DB"
database_id = "34c5ddb6-1c54-4aff-b307-5a104509a4ce"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "SUM_KV"
id = "2b0a16741ce345a4a177b48bbf2bfc30"

[[r2_buckets]]
bucket_name = "spinupmail-attachments"
binding = "R2_BUCKET"

[[send_email]]
name = "EMAIL"

[[queues.producers]]
queue = "spinupmail-integration-dispatches"
binding = "INTEGRATION_DISPATCH_QUEUE"

[[queues.consumers]]
queue = "spinupmail-integration-dispatches"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 2
dead_letter_queue = "spinupmail-integration-dispatches-dlq"

[vars]
EMAIL_DOMAINS = "spinupmail.dev"
MAX_ADDRESSES_PER_ORGANIZATION = "10"
MAX_INTEGRATIONS_PER_ORGANIZATION = "3"
MAX_INTEGRATION_DISPATCHES_PER_ORGANIZATION_PER_DAY = "100"
MAX_RECEIVED_EMAILS_PER_ORGANIZATION = "1000"
MAX_RECEIVED_EMAILS_PER_ADDRESS = "100"
RESEND_FROM_EMAIL = "Spinupmail <verify@spinupmail.com>"
OPERATIONAL_EVENT_RETENTION_DAYS = "30"
OPERATIONAL_EVENT_MAX_METADATA_BYTES = "4096"
OPERATIONAL_EVENT_NOISY_RATE_LIMIT_WINDOW_SECONDS = "300"
OPERATIONAL_EVENT_NOISY_RATE_LIMIT_MAX = "1"
EMAIL_MAX_BYTES = "10485760"
EMAIL_BODY_MAX_BYTES = "524288"
EMAIL_ATTACHMENT_MAX_BYTES = "10485760"
EMAIL_ATTACHMENT_MAX_TOTAL_BYTES_PER_ORGANIZATION = "104857600"
INTEGRATION_QUEUE_RETRY_WINDOW_SECONDS = "21600"
INTEGRATION_QUEUE_BASE_DELAY_SECONDS = "30"
INTEGRATION_QUEUE_MAX_DELAY_SECONDS = "1800"
INTEGRATION_QUEUE_JITTER_SECONDS = "10"

# To protect the database id, kv id, we ignore this
# file when committing to the repo by running once:
# git update-index --assume-unchanged wrangler.toml
#
# Put back in git if you need to commit this file:
# git update-index --no-assume-unchanged wrangler.toml
