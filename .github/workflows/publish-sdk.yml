name: Publish SDK

on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:

jobs:
  sdk-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify SDK tag matches package version
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sdk-v}"
          PACKAGE_VERSION="$(node -p "require('./packages/sdk/package.json').version")"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "SDK tag version ($TAG_VERSION) does not match packages/sdk/package.json ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck SDK
        run: pnpm -C packages/sdk typecheck

  publish:
    needs: sdk-typecheck
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify SDK tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sdk-v}"
          PACKAGE_VERSION="$(node -p "require('./packages/sdk/package.json').version")"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "SDK tag version ($TAG_VERSION) does not match packages/sdk/package.json ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Show versions
        run: |
          node -v
          npm -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm -C packages/sdk build

      - name: Test SDK
        run: pnpm -C packages/sdk test

      - name: Package smoke test
        run: pnpm -C packages/sdk test:package

      - name: Publish spinupmail
        working-directory: packages/sdk
        run: npm publish
